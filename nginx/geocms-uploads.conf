# ============================================================
# GeoCMS Nginx 基础配置片段
# 说明: 此配置需要添加到您网站的 Nginx server {} 块中
# ============================================================

# 静态上传文件（图片、附件等）直接由 Nginx 提供服务
# 这是解决"图片上传后无法预览"问题的关键配置
location /uploads/ {
    alias /www/wwwroot/moligeocms/public/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin *;
    
    # 防止目录遍历
    autoindex off;
    
    # 常见图片类型的 MIME 设置
    types {
        image/jpeg jpg jpeg;
        image/png png;
        image/gif gif;
        image/webp webp;
        image/svg+xml svg;
        application/pdf pdf;
    }
}

